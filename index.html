<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner FSP - Seguridad</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; background: #1a1a1a; color: white; }
        #interactive { width: 100%; height: 350px; background: #000; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        /* Cuadro de guía para el usuario */
        .overlay { position: absolute; top: 50%; left: 50%; width: 70%; height: 100px; border: 2px solid #4CAF50; transform: translate(-50%, -50%); box-shadow: 0 0 0 4000px rgba(0,0,0,0.5); pointer-events: none; }
        .controls { padding: 20px; background: #2d2d2d; }
        #resultado { font-size: 1.4em; font-weight: bold; color: #4CAF50; margin: 10px 0; min-height: 1.5em; }
        .historial { text-align: left; padding: 15px; background: #333; margin: 10px; border-radius: 8px; max-height: 250px; overflow-y: auto; font-size: 0.9em; }
        .badge-success { color: #81C784; float: right; }
        li { border-bottom: 1px solid #444; padding: 8px 0; list-style: none; }
    </style>
</head>
<body>

    <h2 style="margin: 15px 0;">Scanner de Seguridad</h2>
    <div id="interactive" class="viewport">
        <div class="overlay"></div> </div>
    
    <div class="controls">
        <div id="resultado">Esperando código...</div>
        <button onclick="location.reload()" style="padding: 12px 25px; background: #444; color: white; border: none; border-radius: 5px;">Reiniciar Cámara</button>
    </div>

    <div class="historial">
        <strong>Historial de Envío (Sheets):</strong>
        <ul id="lista-historial" style="padding: 0;"></ul>
    </div>

    <script>
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSf0EUNKx74w6MbGT_MPiubF9W9mCOuQq3YitSh2IvUIcmG8Pg/formResponse";
        let isProcessing = false; // Bloqueo para evitar duplicados

        function iniciarEscaneo() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: { facingMode: "environment", focusMode: "continuous" }
                },
                decoder: {
                    // Agregamos code_39 por si hay etiquetas de seguridad antiguas
                    readers: ["ean_reader", "code_128_reader", "ean_8_reader", "code_39_reader"]
                }
            }, function(err) {
                if (err) { alert("Error de cámara: " + err); return }
                Quagga.start();
            });
        }

        Quagga.onDetected(function(data) {
            const code = data.codeResult.code;
            
            // Si ya estamos procesando un código, ignoramos este
            if (isProcessing) return;

            isProcessing = true;
            document.getElementById('resultado').innerText = "Enviando: " + code;
            
            // Feedback táctil (vibración) si el celular lo permite
            if (navigator.vibrate) navigator.vibrate(100);

            enviarAGoogle(code);
        });

        async function enviarAGoogle(codigo) {
            const formData = new URLSearchParams();
            const horaActual = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            formData.append('entry.24310667', 'D001-CHILLAN');
            formData.append('entry.404578387', 'Con Recuperación');
            formData.append('entry.1966026737', codigo); 
            formData.append('entry.1707646492', horaActual); 
            formData.append('entry.1997818687', '17:10');

            try {
                await fetch(FORM_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });
                
                actualizarHistorial(codigo);
                
                // Esperamos 2.5 segundos antes de permitir el siguiente escaneo
                setTimeout(() => {
                    document.getElementById('resultado').innerText = "Listo para el siguiente";
                    isProcessing = false;
                }, 2500);

            } catch (e) {
                console.error("Error:", e);
                isProcessing = false;
            }
        }

        function actualizarHistorial(codigo) {
            const lista = document.getElementById('lista-historial');
            const li = document.createElement('li');
            const ahora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            li.innerHTML = `<span>${ahora} - ${codigo}</span> <span class="badge-success">✓ Registrado</span>`;
            lista.prepend(li);
        }

        iniciarEscaneo();
    </script>
</body>
</html>
