<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner FSP - Auditoría</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8f9fa; color: #333; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #003399; color: white; padding: 10px; text-align: center; font-size: 0.9em; }
        
        /* Contenedor Cámara */
        #scanner-box { width: 100%; height: 200px; background: #000; position: relative; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 50%; left: 50%; width: 60%; height: 60px; border: 2px solid #4CAF50; transform: translate(-50%, -50%); pointer-events: none; }

        /* Controles */
        .controls { padding: 15px; display: flex; gap: 10px; justify-content: center; }
        button { border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-start { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        .btn-send { background: #003399; color: white; width: 90%; margin: 10px auto; display: block; }

        /* Lista de Capturas */
        .list-container { flex-grow: 1; overflow-y: auto; padding: 15px; background: white; margin: 10px; border-radius: 12px; border: 1px solid #ddd; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px dotted #ccc; }
        .btn-delete { background: none; color: #dc3545; font-size: 1.2em; border: none; padding: 5px; }

        /* Formulario invisible */
        #hidden-form { display: none; }
    </style>
</head>
<body>

    <div class="header">AUDITORÍA DE PRODUCTOS - FASHIONS PARK</div>

    <div id="scanner-box">
        <div id="interactive" class="viewport"></div>
        <div class="overlay"></div>
    </div>

    <div class="controls">
        <button id="btnToggle" class="btn-start" onclick="toggleCamara()">Iniciar Cámara</button>
    </div>

    <div class="list-container">
        <strong>Productos Capturados:</strong>
        <div id="lista-codigos"></div>
    </div>

    <button class="btn-send" onclick="confirmarEnvio()">FINALIZAR Y ENVIAR AL FORMULARIO</button>

    <script>
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSf0EUNKx74w6MbGT_MPiubF9W9mCOuQq3YitSh2IvUIcmG8Pg/formResponse";
        let listado = [];
        let camaraActiva = false;

        function toggleCamara() {
            const box = document.getElementById('scanner-box');
            const btn = document.getElementById('btnToggle');
            
            if (!camaraActiva) {
                box.style.display = 'block';
                btn.innerText = "Detener Cámara";
                btn.className = "btn-stop";
                iniciarQuagga();
            } else {
                box.style.display = 'none';
                btn.innerText = "Iniciar Cámara";
                btn.className = "btn-start";
                Quagga.stop();
            }
            camaraActiva = !camaraActiva;
        }

        function iniciarQuagga() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader", "code_128_reader"] }
            }, (err) => { if(!err) Quagga.start(); });
        }

        Quagga.onDetected((data) => {
            const code = data.codeResult.code;
            if (!listado.includes(code)) {
                listado.push(code);
                renderizarLista();
                if (navigator.vibrate) navigator.vibrate(50);
            }
        });

        function renderizarLista() {
            const container = document.getElementById('lista-codigos');
            container.innerHTML = "";
            listado.forEach((code, index) => {
                container.innerHTML += `
                    <div class="item">
                        <span>${code}</span>
                        <button class="btn-delete" onclick="eliminarFila(${index})">✕</button>
                    </div>`;
            });
        }

        function eliminarFila(index) {
            listado.splice(index, 1);
            renderizarLista();
        }

        async function confirmarEnvio() {
            if (listado.length === 0) return alert("No hay códigos capturados.");
            
            const confirmacion = confirm(`¿Enviar ${listado.length} productos al formulario?`);
            if (confirmacion) {
                // UNIMOS POR COMA: "780,781,782,"
                const stringFinal = listado.join(",") + ",";
                
                const formData = new URLSearchParams();
                formData.append('entry.24310667', 'D001-CHILLAN');
                formData.append('entry.404578387', 'Con Recuperación');
                formData.append('entry.1966026737', stringFinal); // Enviamos todo separado por comas
                formData.append('entry.1707646492', new Date().toLocaleTimeString());
                formData.append('entry.1997818687', '17:10');

                try {
                    await fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body: formData });
                    alert("¡Datos enviados con éxito!");
                    listado = [];
                    renderizarLista();
                    if(camaraActiva) toggleCamara();
                } catch (e) {
                    alert("Error al enviar.");
                }
            }
        }
    </script>
</body>
</html>
