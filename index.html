<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoría FSP - V2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; }
        .step { display: none; padding: 20px; }
        .active { display: block; }
        
        /* Estilos UI */
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .btn-primary { background: #003399; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-outline { background: white; border: 2px solid #003399; color: #003399; }

        /* Scanner */
        #interactive { width: 100%; height: 200px; background: #000; border-radius: 8px; overflow: hidden; }
        .item-list { max-height: 200px; overflow-y: auto; background: #fff; border: 1px solid #eee; border-radius: 8px; margin: 10px 0; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .delete-btn { color: #dc3545; font-weight: bold; border: none; background: none; }
    </style>
</head>
<body>

    <div id="step1" class="step active">
        <div class="card">
            <h2 style="color:#003399">Datos de Auditoría</h2>
            <label>Tienda:</label>
            <select id="tienda">
                <option value="D001-CHILLAN">D001-CHILLAN</option>
                <option value="D002-LA_FLORIDA">D002-LA FLORIDA</option>
                <option value="D003-RANCAGUA">D003-RANCAGUA</option>
            </select>
            <label>RUT Auditor (sin puntos):</label>
            <input type="text" id="rut" placeholder="12345678-9">
            <button class="btn-primary" onclick="irAStep2()">Siguiente: Capturar Productos</button>
        </div>
    </div>

    <div id="step2" class="step">
        <div class="card">
            <div id="interactive" class="viewport"></div>
            <div id="status" style="text-align:center; margin:10px; font-weight:bold; color:#28a745;">Cámara lista</div>
            
            <div style="display:flex; gap:5px;">
                <input type="text" id="manualCode" placeholder="Código Manual">
                <button class="btn-outline" style="width:auto; margin:0;" onclick="agregarManual()">Añadir</button>
            </div>

            <div class="item-list" id="lista"></div>
            
            <p style="font-size:0.8em; color:#666;">* Los códigos se separarán por coma automáticamente.</p>
            <button class="btn-success" onclick="enviarFinal()">FINALIZAR Y ENVIAR</button>
            <button class="btn-outline" onclick="location.reload()">Cancelar</button>
        </div>
    </div>

    <script>
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSf0EUNKx74w6MbGT_MPiubF9W9mCOuQq3YitSh2IvUIcmG8Pg/formResponse";
        let productos = [];
        let isWaiting = false;

        function irAStep2() {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            iniciarQuagga();
        }

        function iniciarQuagga() {
            Quagga.init({
                inputStream: { name: "Live", type: "LiveStream", target: document.querySelector('#interactive'), constraints: { facingMode: "environment" } },
                decoder: { readers: ["ean_reader", "code_128_reader"] }
            }, (err) => { if(!err) Quagga.start(); });
        }

        Quagga.onDetected((data) => {
            const code = data.codeResult.code;
            if (isWaiting) return; // Si está en pausa, no hace nada

            isWaiting = true;
            document.getElementById('status').innerText = "¡Capturado! Espere...";
            document.getElementById('status').style.color = "#dc3545";

            agregarProducto(code);

            // DELAY: Espera 2.5 segundos antes de permitir otra captura
            setTimeout(() => {
                isWaiting = false;
                document.getElementById('status').innerText = "Listo para el siguiente";
                document.getElementById('status').style.color = "#28a745";
            }, 2500);
        });

        function agregarManual() {
            const val = document.getElementById('manualCode').value;
            if(val) {
                agregarProducto(val);
                document.getElementById('manualCode').value = "";
            }
        }

        function agregarProducto(code) {
            if (!productos.includes(code)) {
                productos.push(code);
                actualizarVista();
                if (navigator.vibrate) navigator.vibrate(100);
            }
        }

        function actualizarVista() {
            const div = document.getElementById('lista');
            div.innerHTML = productos.map((p, i) => `
                <div class="item">
                    <span>${p}</span>
                    <button class="delete-btn" onclick="eliminar(${i})">✕</button>
                </div>
            `).join('');
        }

        function eliminar(idx) {
            productos.splice(idx, 1);
            actualizarVista();
        }

        async function enviarFinal() {
            if (productos.length === 0) return alert("No hay productos.");
            
            const confirmacion = confirm(`Se enviarán ${productos.length} productos. ¿Confirmar?`);
            if (!confirmacion) return;

            const finalString = productos.join(",") + ",";
            const tienda = document.getElementById('tienda').value;
            const rut = document.getElementById('rut').value;

            const formData = new URLSearchParams();
            formData.append('entry.24310667', tienda);
            formData.append('entry.714634507', rut); // Asumiendo que este es el ID de RUT
            formData.append('entry.1966026737', finalString);
            formData.append('entry.404578387', 'Con Recuperación');
            formData.append('entry.1707646492', new Date().toLocaleTimeString());
            formData.append('entry.1997818687', 'FINALIZADO');

            try {
                await fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body: formData });
                alert("Enviado correctamente a Google Sheets.");
                location.reload();
            } catch (e) {
                alert("Error al enviar.");
            }
        }
    </script>
</body>
</html>
