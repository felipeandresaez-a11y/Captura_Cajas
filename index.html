<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Productos - Seguridad FSP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; background: #f4f4f9; }
        #interactive { width: 100%; height: 300px; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { padding: 20px; }
        #resultado { font-size: 1.5em; font-weight: bold; color: #2c3e50; margin: 10px 0; }
        .historial { text-align: left; padding: 15px; background: white; margin: 10px; border-radius: 8px; max-height: 200px; overflow-y: auto; }
        .badge-success { color: green; font-size: 0.8em; }
    </style>
</head>
<body>

    <h2>Scanner de Seguridad</h2>
    <div id="interactive" class="viewport"></div>
    
    <div class="controls">
        <div id="resultado">Esperando código...</div>
        <button onclick="iniciarEscaneo()" style="padding: 10px 20px; font-size: 1em;">Reiniciar Cámara</button>
    </div>

    <div class="historial" id="historial">
        <strong>Últimos escaneos:</strong>
        <ul id="lista-historial"></ul>
    </div>

    <script>
        // Configuración de Google Forms
        const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSf0EUNKx74w6MbGT_MPiubF9W9mCOuQq3YitSh2IvUIcmG8Pg/formResponse";
        
        function iniciarEscaneo() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: { facingMode: "environment" } // Usa la cámara trasera
                },
                decoder: {
                    readers: ["ean_reader", "code_128_reader", "ean_8_reader"] // Formatos típicos de retail
                }
            }, function(err) {
                if (err) { console.log(err); return }
                Quagga.start();
            });
        }

        // Al detectar un código
        Quagga.onDetected(function(data) {
            const code = data.codeResult.code;
            document.getElementById('resultado').innerText = "Detectado: " + code;
            
            // Pausamos un segundo para evitar múltiples envíos del mismo código
            Quagga.stop();
            enviarAGoogle(code);
            
            // Reiniciamos después de 2 segundos para el siguiente producto
            setTimeout(() => { iniciarEscaneo(); }, 2000);
        });

        async function enviarAGoogle(codigo) {
            const formData = new URLSearchParams();
            // Tus IDs específicos
            formData.append('entry.24310667', 'D001-CHILLAN');
            formData.append('entry.404578387', 'Con Recuperación');
            formData.append('entry.1966026737', codigo); // El producto escaneado
            formData.append('entry.1707646492', '17:00'); 
            formData.append('entry.1997818687', '17:10');

            try {
                await fetch(FORM_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: formData
                });
                actualizarHistorial(codigo);
            } catch (e) {
                console.error("Error enviando:", e);
            }
        }

        function actualizarHistorial(codigo) {
            const lista = document.getElementById('lista-historial');
            const li = document.createElement('li');
            li.innerHTML = `${codigo} <span class="badge-success">✓ Enviado</span>`;
            lista.prepend(li);
        }

        iniciarEscaneo();
    </script>
</body>
</html>
